apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: backend
  namespace: apps

spec:
  ingressClassName: nginx

  rules:
  - host: api.funsdevops.com
    http:
      paths:
      - path: /
        pathType: Prefix

        backend:
          service:
            name: backend
            port:
              number: 80