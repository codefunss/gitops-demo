apiVersion: apps/v1
kind: Deployment
metadata:
  name: backend
  namespace: apps

spec:
  replicas: 2

  selector:
    matchLabels:
      app: backend

  template:
    metadata:
      labels:
        app: backend

    spec:
      containers:
      - name: backend
        image: codefuns/cashbot:v3

        ports:
        - containerPort: 8080